<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- forms : these are used to take the information from the user -->
     <h1>SignUp Page</h1> 
     <form action="./forms.html">
        <label for="username">UserName</label><br> <!--label: it gives description of the input or extra hints for user ot text caption for an item in a user interface-->
        <input type="text" placeholder="username" required="true" id="username"><br>
        <label>Email</label><br>  <!--for it is used to store the data of particular input-->
        <input type="email" placeholder="Email" required="true"><br>
        <label>Password</label><br>
        <input type="password" placeholder="Password" required="true"><br><br>
        <label>Phone Number</label><br>
        <input type="number" placeholder="number" required><br><br>
        <label>Tele Phone Number</label><br>
        <input type="tel" placeholder="tell phone number" required><br><br>
        <label>Range</label><br>
        <input type="range" value="20" readonly><br><br>
        <label>Color</label><br>
        <input type="color"><br><br>
        <label>radio</label><br>
        <input type="radio" name="gender" required>male
        <input type="radio" name="gender" required>femlae<br><br>
        <label>checkbox</label><br>
        <input type="checkbox">Python<br><br>
        <input type="checkbox">SQL<br><br>
        <input type="checkbox">JAVA<br><br>
        <input type="checkbox">DSA<br><br>
         <label>Time</label><br>
        <input type="time"><br><br>
        <label>Date Time</label><br>
        <input type="datetime"><br><br>
        <label>File</label><br>
        <input type="file"><br><br>
        <label>Month</label><br>
        <input type="month"><br><br>
        <label>hidden</label><br>
        <input type="hidden" value="maahi"><br><br><!--it is used to store data that should be snt with form not visbile to user or edit by user-->
        <input type="reset" value="reset">
        <input type="submit" value="Create Account">
     </form>
</body>
</html>
